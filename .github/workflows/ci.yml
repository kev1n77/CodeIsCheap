name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        if: runner.os == 'Linux'
        run: cargo fmt --all -- --check

      - name: Run tests
        run: cargo test --workspace --all-targets

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  sidecar:
    name: Sidecar (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            sidecars/mitmproxy/requirements.txt
            sidecars/mitmproxy/requirements-build.txt

      - name: Install pinned sidecar toolchain
        run: python -m pip install -r sidecars/mitmproxy/requirements-build.txt

      - name: Run addon tests
        run: python -m unittest discover -s sidecars/mitmproxy/tests -v

      - name: Package and probe sidecar
        run: python sidecars/mitmproxy/package_sidecar.py

      - uses: actions/upload-artifact@v4
        with:
          name: sidecar-manifest-${{ matrix.os }}
          path: sidecars/mitmproxy/dist/sidecar-manifest.json
          retention-days: 7
