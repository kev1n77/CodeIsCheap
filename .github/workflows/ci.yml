name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  desktop-frontend:
    name: Desktop frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install desktop dependencies
        run: npm ci

      - name: Check desktop frontend
        run: npm run desktop:check

      - name: Build desktop frontend
        run: npm run desktop:build

  desktop-native:
    name: Desktop native (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> apps/desktop/src-tauri/target

      - name: Check desktop formatting
        run: cargo fmt --manifest-path apps/desktop/src-tauri/Cargo.toml -- --check

      - name: Test desktop native shell
        run: cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml

      - name: Check desktop native shell
        run: cargo check --manifest-path apps/desktop/src-tauri/Cargo.toml

  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        if: runner.os == 'Linux'
        run: cargo fmt --all -- --check

      - name: Run tests
        run: cargo test --workspace --all-targets

      - name: Run real OS credential store experiment
        if: runner.os == 'Windows' || runner.os == 'macOS'
        run: cargo test -p codeischeap-storage --test os_key_store real_os_key_store_round_trip -- --ignored --exact --nocapture

      - name: Run real WinINet recovery experiment
        if: runner.os == 'Windows'
        run: cargo test -p codeischeap-proxy-recovery --test windows_registry real_windows_proxy_is_restored_after_force_kill -- --ignored --exact --nocapture --test-threads=1

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run real macOS networksetup recovery experiment
        if: runner.os == 'macOS'
        run: |
          cargo build -p codeischeap-proxy-recovery --bins
          sudo target/debug/proxy-recovery-macos-experiment

  sidecar:
    name: Sidecar (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            sidecars/mitmproxy/requirements.txt
            sidecars/mitmproxy/requirements-build.txt

      - name: Install pinned sidecar toolchain
        run: python -m pip install -r sidecars/mitmproxy/requirements-build.txt

      - name: Run addon tests
        run: python -m unittest discover -s sidecars/mitmproxy/tests -v

      - name: Package and probe sidecar
        run: python sidecars/mitmproxy/package_sidecar.py

      - uses: actions/upload-artifact@v4
        with:
          name: sidecar-manifest-${{ matrix.os }}
          path: sidecars/mitmproxy/dist/sidecar-manifest.json
          retention-days: 7
