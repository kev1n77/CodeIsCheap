name: Signed release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing v<semver> tag to release
        required: true
        type: string

concurrency:
  group: signed-release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  preflight:
    name: Release preflight
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          fetch-depth: 0

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - id: release
        name: Validate tag and application version
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          tag_commit="$(git rev-parse "$RELEASE_TAG^{commit}")"
          git merge-base --is-ancestor "$tag_commit" origin/main || {
            echo "release tag must point to a commit contained in main" >&2
            exit 1
          }
          version="$(python scripts/prepare_release.py check-version --repository-root . --tag "$RELEASE_TAG")"
          printf 'tag=%s\n' "$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          printf 'version=%s\n' "$version" >> "$GITHUB_OUTPUT"

      - name: Run release preparation tests
        run: python -m unittest discover -s scripts/tests -v

      - name: Require completed GA readiness evidence
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          readiness_args=(--repository-root . --tag "$RELEASE_TAG")
          if [[ "$RELEASE_VERSION" == *-* ]]; then
            readiness_args+=(--allow-pending)
          fi
          python scripts/verify_release_readiness.py "${readiness_args[@]}"

      - name: Verify repository supply chain policy
        run: python scripts/verify_supply_chain.py

  build:
    name: Signed desktop (${{ matrix.os }})
    needs: preflight
    environment: release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    env:
      CODEISCHEAP_UPDATER_PUBLIC_KEY: ${{ secrets.CODEISCHEAP_UPDATER_PUBLIC_KEY }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
      WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
      APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: ${{ needs.preflight.outputs.tag }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: npm

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            sidecars/mitmproxy/requirements.txt
            sidecars/mitmproxy/requirements-build.txt

      - name: Install Rust toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2.9.1
        with:
          workspaces: apps/desktop/src-tauri -> apps/desktop/src-tauri/target

      - name: Validate common signing secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "$CODEISCHEAP_UPDATER_PUBLIC_KEY" || { echo "CODEISCHEAP_UPDATER_PUBLIC_KEY is required" >&2; exit 1; }
          test -n "$TAURI_SIGNING_PRIVATE_KEY" || { echo "TAURI_SIGNING_PRIVATE_KEY is required" >&2; exit 1; }

      - name: Validate Windows signing secrets
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          foreach ($name in @('WINDOWS_CERTIFICATE_BASE64', 'WINDOWS_CERTIFICATE_PASSWORD')) {
            if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($name))) {
              throw "$name is required"
            }
          }

      - name: Validate macOS signing and notarization secrets
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          for name in APPLE_CERTIFICATE_BASE64 APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY APPLE_ID APPLE_PASSWORD APPLE_TEAM_ID; do
            test -n "${!name:-}" || { echo "$name is required" >&2; exit 1; }
          done

      - name: Install build dependencies
        run: |
          npm ci
          python -m pip install -r sidecars/mitmproxy/requirements-build.txt

      - name: Build sidecar
        run: python sidecars/mitmproxy/package_sidecar.py

      - name: Import Windows signing certificate and sign sidecar
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $pfx = Join-Path $env:RUNNER_TEMP 'codeischeap-release.pfx'
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_BASE64))
          $password = ConvertTo-SecureString $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
          $certificates = @(Import-PfxCertificate -FilePath $pfx -CertStoreLocation Cert:\CurrentUser\My -Password $password -Exportable)
          $certificate = $certificates | Where-Object HasPrivateKey | Select-Object -First 1
          if ($null -eq $certificate -or [string]::IsNullOrWhiteSpace($certificate.Thumbprint)) {
            throw 'Windows code-signing certificate import failed'
          }
          "WINDOWS_CERTIFICATE_THUMBPRINT=$($certificate.Thumbprint)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          $sidecars = @(Get-ChildItem sidecars/mitmproxy/dist/codeischeap-mitmproxy-*-pc-windows-msvc.exe -File -ErrorAction Stop)
          if ($sidecars.Count -ne 1) { throw 'exactly one Windows sidecar artifact is required' }
          $signtool = (Get-Command signtool.exe -ErrorAction Stop).Source
          & $signtool sign /sha1 $certificate.Thumbprint /fd SHA256 /td SHA256 /tr https://timestamp.digicert.com $sidecars[0].FullName
          if ($LASTEXITCODE -ne 0) { throw 'Windows sidecar signing failed' }
          Remove-Item -LiteralPath $pfx -Force

      - name: Import Apple signing certificate and sign sidecar
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          keychain="$RUNNER_TEMP/codeischeap-release.keychain-db"
          certificate="$RUNNER_TEMP/codeischeap-release.p12"
          python - "$certificate" <<'PY'
          import base64
          import os
          from pathlib import Path
          import sys

          Path(sys.argv[1]).write_bytes(
              base64.b64decode(os.environ["APPLE_CERTIFICATE_BASE64"], validate=True)
          )
          PY
          security create-keychain -p "$APPLE_CERTIFICATE_PASSWORD" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$APPLE_CERTIFICATE_PASSWORD" "$keychain"
          security import "$certificate" -k "$keychain" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s "$keychain"
          security default-keychain -s "$keychain"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$APPLE_CERTIFICATE_PASSWORD" "$keychain"
          printf 'APPLE_KEYCHAIN=%s\n' "$keychain" >> "$GITHUB_ENV"
          rm -f "$certificate"
          sidecar="$(find sidecars/mitmproxy/dist -maxdepth 1 -type f -name 'codeischeap-mitmproxy-*-apple-darwin' -print -quit)"
          test -n "$sidecar"
          codesign --force --options runtime --timestamp --sign "$APPLE_SIGNING_IDENTITY" "$sidecar"
          codesign --verify --deep --strict --verbose=2 "$sidecar"

      - name: Regenerate and require signed sidecar metadata
        run: |
          python sidecars/mitmproxy/package_sidecar.py --skip-build
          python sidecars/mitmproxy/verify_sidecar_bundle.py sidecars/mitmproxy/dist --require-signature
          python sidecars/mitmproxy/install_sidecar_bundle.py sidecars/mitmproxy/dist apps/desktop/src-tauri/resources/sidecar --require-signature

      - name: Build signed Windows desktop bundles
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $configPath = Join-Path $env:RUNNER_TEMP 'tauri.windows-signing.json'
          @{
            bundle = @{
              windows = @{
                certificateThumbprint = $env:WINDOWS_CERTIFICATE_THUMBPRINT
                digestAlgorithm = 'sha256'
                timestampUrl = 'https://timestamp.digicert.com'
              }
            }
          } | ConvertTo-Json -Depth 5 | Set-Content -LiteralPath $configPath -Encoding utf8
          npm run desktop:tauri -- build --bundles nsis --config $configPath --ci

      - name: Build signed and notarized macOS desktop bundles
        if: runner.os == 'macOS'
        shell: bash
        run: npm run desktop:tauri -- build --bundles app,dmg --ci

      - id: platform
        name: Stage and verify Windows release artifacts
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $staging = Join-Path $env:RUNNER_TEMP 'release-windows-x86_64'
          New-Item -ItemType Directory -Path $staging | Out-Null
          Get-ChildItem apps/desktop/src-tauri/target/release/bundle/nsis -File | Copy-Item -Destination $staging
          $installers = @(Get-ChildItem $staging -File -Filter *.exe)
          if ($installers.Count -ne 1) { throw 'exactly one Windows updater installer is required' }
          $installer = $installers[0]
          $updaters = @(Get-ChildItem $staging -File -Filter *.nsis.zip)
          if ($updaters.Count -ne 1) { throw 'exactly one Windows updater archive is required' }
          $signature = Get-Item "$($updaters[0].FullName).sig" -ErrorAction Stop
          if ((Get-AuthenticodeSignature -LiteralPath $installer.FullName).Status -ne 'Valid') {
            throw 'Windows installer Authenticode verification failed'
          }
          if ($signature.Length -eq 0) { throw 'Windows updater signature is empty' }
          "key=windows-x86_64" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "path=$staging" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - id: mac_platform
        name: Stage and verify macOS release artifacts
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          case "$(uname -m)" in
            x86_64) platform=darwin-x86_64 ;;
            arm64) platform=darwin-aarch64 ;;
            *) echo "unsupported macOS release architecture" >&2; exit 1 ;;
          esac
          staging="$RUNNER_TEMP/release-$platform"
          mkdir -p "$staging"
          find apps/desktop/src-tauri/target/release/bundle -type f \( -name '*.dmg' -o -name '*.app.tar.gz' -o -name '*.sig' \) -exec cp {} "$staging" \;
          updater="$(find "$staging" -maxdepth 1 -type f -name '*.app.tar.gz' -print -quit)"
          test -n "$updater" && test -s "$updater.sig"
          dmg="$(find "$staging" -maxdepth 1 -type f -name '*.dmg' -print -quit)"
          test -n "$dmg"
          codesign --verify --deep --strict --verbose=2 "$dmg"
          xcrun stapler validate "$dmg"
          printf 'key=%s\n' "$platform" >> "$GITHUB_OUTPUT"
          printf 'path=%s\n' "$staging" >> "$GITHUB_OUTPUT"

      - name: Upload signed release artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-${{ steps.platform.outputs.key || steps.mac_platform.outputs.key }}
          path: ${{ steps.platform.outputs.path || steps.mac_platform.outputs.path }}/*
          if-no-files-found: error
          retention-days: 14

      - name: Remove temporary Apple keychain
        if: always() && runner.os == 'macOS'
        shell: bash
        run: |
          if test -n "${APPLE_KEYCHAIN:-}" && test -f "$APPLE_KEYCHAIN"; then
            security delete-keychain "$APPLE_KEYCHAIN"
          fi

  publish:
    name: Publish signed release
    needs: [preflight, build]
    environment: release
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ needs.preflight.outputs.tag }}
      RELEASE_VERSION: ${{ needs.preflight.outputs.version }}
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: ${{ needs.preflight.outputs.tag }}

      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Download signed platform artifacts
        shell: bash
        run: gh run download "$GITHUB_RUN_ID" --pattern 'release-*' --dir release-input

      - name: Prepare and verify release directory
        shell: bash
        run: |
          set -euo pipefail
          notes_file="release/notes/${RELEASE_TAG}.md"
          test -f "$notes_file" && test -s "$notes_file" || {
            echo "reviewed release notes are required at $notes_file" >&2
            exit 1
          }
          cp "$notes_file" release-notes.md
          python scripts/prepare_release.py prepare \
            --repository-root . \
            --input release-input \
            --output release-output \
            --tag "$RELEASE_TAG" \
            --github-repository "$GITHUB_REPOSITORY" \
            --pub-date "$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            --notes-file release-notes.md
          python scripts/prepare_release.py verify --output release-output
          test -s release-output/release-readiness.v0.1.json

      - name: Create draft release and publish only after upload succeeds
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "release $RELEASE_TAG already exists" >&2
            exit 1
          fi
          gh release create "$RELEASE_TAG" release-output/* \
            --draft \
            --verify-tag \
            --title "CodeIsCheap $RELEASE_VERSION" \
            --notes-file release-notes.md
          if [[ "$RELEASE_VERSION" == *-* ]]; then
            gh release edit "$RELEASE_TAG" --draft=false --prerelease
          else
            gh release edit "$RELEASE_TAG" --draft=false
          fi
